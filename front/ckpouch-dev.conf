# core service setup
core.id=ckpouch-front
core.name=CKPouch Front
core.version=0.5.0
#core.pipe=/home/appadmin/ckpouch/bdms-server/front/.fifo
#core.svcdir=/home/ckstack/apps/sea/service
core.svcdir=/home/ubuntu/apps/ckpouch/front/service
core.module-map=/conf/module-map.cfg.json
core.event-map=/conf/event-map.cfg.json
core.scheduler-map=/conf/scheduler-map.cfg.json
core.http-map=/conf/http-map.cfg.json
core.ws-map=/conf/ws-map.cfg.json
core.mqtt-map=/conf/mqtt-map.cfg.json
core.amqp-map=/conf/amqp-map.cfg.json
core.redis-map=/conf/redis-map.cfg.json

# log
log.console=true
log.out=/data/log/apps/ckpouch/front-out.log
log.err=/data/log/apps/ckpouch/front-err.log
log.max-files=14d
log.default-level=debug
log.scheduler-level=verbose
#log.mqtt.host=localhost
#log.mqtt.port=1883
#log.mqtt.username=ckpouch_user
#log.mqtt.password=ckpouch
#log.mqtt.protocol=mqtt
#log.mqtt.base-topic=sys/ckpouch/log
#log.mqtt.default-level=warn

# http setup
# usage : http.{alias}.{config}

