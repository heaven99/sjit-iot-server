# service setup
service.hello=world
# service api key
# http request header apiKey value should be [ckpouch-api-key]
service.api.key=ckpouch-api-key
# jwt setup
service.jwt.secret=ckpouch-secret-key
service.jwt.refresh-secret=ckpouch-refresh-secret-key
service.jwt.access-token-expiry-sec=3600
service.jwt.refresh-token-expiry=7d
# api server setup
service.api-server.protocol=http
service.api-server.host=localhost
service.api-server.port=11001

